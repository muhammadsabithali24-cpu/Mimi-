<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mimi 💕</title>

<!-- Calligraphy Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff0f5);
    overflow: hidden;
    text-align: center;
}

/* Intro */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    padding: 12px 22px;
    border: none;
    background: #ff4d88;
    color: white;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
}

#countdown {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    justify-content: center;
    align-items: center;
    font-size: 120px;
    color: #ff4d88;
}

#bigWish {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ffd6e0;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#bigText {
    font-family: 'Great Vibes', cursive;
    font-size: 100px;
    color: #ff4d88;
    animation: pop 1s ease-out, glow 1.5s infinite alternate;
}

@keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d88; }
    to { text-shadow: 0 0 30px #ff99bb; }
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

#main {
    display: none;
    padding-top: 60px;
}

#typewriter {
    font-size: 50px;
    width: 90%;
    max-width: 1000px;
    margin: auto;
    color: #444;
    line-height: 1.3;
}

.paragraph {
    opacity: 0;
    transition: opacity 1s;
    margin: 30px 0;
}

/* Floating */
.heart {
    position: absolute;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

</style>
</head>

<body>

<div id="intro">
    <h2>I made something for you 💌</h2>
    <button onclick="start()">Open 🎁</button>
</div>

<div id="countdown"></div>

<div id="bigWish">
    <div id="bigText">Happy Birthday Mimi 💕</div>
</div>

<div id="main">
    <div id="typewriter"></div>
</div>

<script>

function start() {
    document.getElementById("intro").style.display = "none";
    startCountdown();
}

// Countdown
let num = 5;
function startCountdown() {
    let cd = document.getElementById("countdown");
    cd.style.display = "flex";
    cd.innerHTML = num;

    let interval = setInterval(() => {
        num--;
        cd.innerHTML = num;

        if (num === 0) {
            clearInterval(interval);
            cd.style.display = "none";
            showWish();
        }
    }, 1000);
}

// Show Wish with confetti
function showWish() {
    let wish = document.getElementById("bigWish");
    wish.style.display = "flex";

    createConfetti();

    setTimeout(() => {
        wish.style.display = "none";
        showMain();
    }, 2500);
}

// Confetti effect
function createConfetti() {
    for (let i = 0; i < 80; i++) {
        let conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = ["#ff4d88","#ffd700","#00c3ff","#7cffcb"][Math.floor(Math.random()*4)];
        document.body.appendChild(conf);
    }
}

// Show Main Message Paragraph by Paragraph
function showMain() {
    document.getElementById("main").style.display = "block";
    floating();

    const paragraphs = [
        "You are the best thing that happened in my life 🤍",
        "Thank you for being with me… always.",
        "I truly pray that all your wishes come true on this beautiful day ✨",
        "I just want to keep celebrating your birthdays with you, again and again 💕",
        "with Love, Yours MU💝"
    ];

    let container = document.getElementById("typewriter");

    paragraphs.forEach((p, index) => {
        let para = document.createElement("div");
        para.className = "paragraph";
        para.innerText = p;
        container.appendChild(para);

        setTimeout(() => {
            para.style.opacity = 1;
        }, index * 2000); // 2 seconds delay between paragraphs
    });
}

// Floating hearts
function floating() {
    setInterval(() => {
        let el = document.createElement("div");
        el.className = "heart";
        el.innerHTML = ["💖","🦋","✨","🌸"][Math.floor(Math.random()*4)];
        el.style.left = Math.random()*100 + "vw";
        el.style.fontSize = "35px";
        el.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(el);
    }, 400);
}

</script>

</body>
</html>
