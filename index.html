<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mimi 💕</title>

<!-- Calligraphy Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff0f5);
    overflow: hidden;
    text-align: center;
}

/* Intro */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    padding: 15px 28px;
    border: none;
    background: #ff4d88;
    color: white;
    border-radius: 30px;
    font-size: 20px;
    cursor: pointer;
}

#countdown {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    justify-content: center;
    align-items: center;
    font-size: 150px;
    color: #ff4d88;
}

#bigWish {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #fff0f5, #ffd6e0);
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#bigText {
    font-family: 'Great Vibes', cursive;
    font-size: 120px;
    color: #ff4d88;
    animation: pop 1s ease-out, glow 1.5s infinite alternate;
}

@keyframes pop {
    0% { transform: scale(0); opacity:0; }
    70% { transform: scale(1.2); opacity:1; }
    100% { transform: scale(1); }
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d88; }
    to { text-shadow: 0 0 40px #ff99bb; }
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* Main message */
#main {
    display: none;
    padding-top: 60px;
}

#typewriter {
    font-size: 80px;
    font-family: 'Great Vibes', cursive;
    width: 90%;
    max-width: 1200px;
    margin: auto;
    color: #ff4d88;
    line-height: 1.2;
    white-space: pre-wrap;
}

.paragraph {
    opacity: 0;
    transform: scale(0.3);
    transition: opacity 1s, transform 1s;
    margin: 40px 0;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(0.3);
}

/* Floating hearts & stars */
.heart, .star {
    position: absolute;
    animation: floatUp linear infinite;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity:1;}
    100% { transform: translateY(-10vh) rotate(360deg); opacity:0;}
}

/* Background glow effect */
.background-glow {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(255,77,136,0.15) 0%, rgba(255,255,255,0) 70%);
    pointer-events: none;
    animation: glowPulse 3s infinite alternate;
}

@keyframes glowPulse {
    0% { opacity:0.3;}
    100% { opacity:0.6;}
}
</style>
</head>

<body>

<div class="background-glow"></div>

<div id="intro">
    <h2>I made something for you 💌</h2>
    <button onclick="start()">Open 🎁</button>
</div>

<div id="countdown"></div>

<div id="bigWish">
    <div id="bigText">Happy Birthday Mimi 💕</div>
</div>

<div id="main">
    <div id="typewriter"></div>
</div>

<script>
function start() {
    document.getElementById("intro").style.display = "none";
    startCountdown();
}

// Countdown
let num = 5;
function startCountdown() {
    let cd = document.getElementById("countdown");
    cd.style.display = "flex";
    cd.innerHTML = num;

    let interval = setInterval(() => {
        num--;
        cd.innerHTML = num;

        if (num === 0) {
            clearInterval(interval);
            cd.style.display = "none";
            showWish();
        }
    }, 1000);
}

// Show Wish with confetti
function showWish() {
    let wish = document.getElementById("bigWish");
    wish.style.display = "flex";
    createConfetti(100);
    setTimeout(() => {
        wish.style.display = "none";
        showMain();
    }, 2500);
}

// Confetti effect
function createConfetti(num=80) {
    for (let i = 0; i < num; i++) {
        let conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = ["#ff4d88","#ffd700","#00c3ff","#7cffcb","#ff99bb","#ff66ff"][Math.floor(Math.random()*6)];
        conf.style.width = conf.style.height = (5 + Math.random()*10)+"px";
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 4000);
    }
}

// Show Main Message Paragraph by Paragraph with cinematic zoom
function showMain() {
    document.getElementById("main").style.display = "block";
    floating();

    const paragraphs = [
        "You are the best thing that happened in my life 🤍",
        "Thank you for being with me… always.",
        "I truly pray that all your wishes come true on this beautiful day ✨",
        "I just want to keep celebrating your birthdays with you, again and again 💕",
        "with Love, Yours MU💝"
    ];

    let container = document.getElementById("typewriter");

    paragraphs.forEach((p, index) => {
        let para = document.createElement("div");
        para.className = "paragraph";
        para.innerText = p;
        container.appendChild(para);

        setTimeout(() => {
            para.style.opacity = 1;
            para.style.transform = "translate(-50%, -50%) scale(1)";
            createConfetti(50);
        }, index * 3000); // 3 seconds between each paragraph

        // Remove previous paragraph after next appears
        setTimeout(() => {
            if (index > 0) {
                container.children[index-1].style.opacity = 0;
            }
        }, index * 3000 + 1000);
    });
}

// Floating hearts & stars
function floating() {
    setInterval(() => {
        let el = document.createElement("div");
        el.className = Math.random() < 0.6 ? "heart" : "star";
        el.innerHTML = ["💖","🦋","✨","🌸","⭐","💝"][Math.floor(Math.random()*6)];
        el.style.left = Math.random()*100 + "vw";
        el.style.fontSize = (25 + Math.random()*30) + "px";
        el.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 8000);
    }, 300);
}
</script>

</body>
</html>
