<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mimi 💕</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff0f5);
    overflow: hidden;
    text-align: center;
}

/* Intro */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    padding: 12px 22px;
    border: none;
    background: #ff4d88;
    color: white;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

/* Countdown */
#countdown {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    justify-content: center;
    align-items: center;
    font-size: 90px;
    color: #ff4d88;
}

/* Big Wish */
#bigWish {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ffd6e0;
    justify-content: center;
    align-items: center;
    font-size: 45px;
    color: #ff4d88;
    font-weight: bold;
    animation: glow 1s infinite alternate;
}

/* Glow effect */
@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d88; }
    to { text-shadow: 0 0 30px #ff99bb; }
}

/* Shake effect */
@keyframes shake {
    0% { transform: translate(0); }
    25% { transform: translate(5px, -5px); }
    50% { transform: translate(-5px, 5px); }
    75% { transform: translate(5px, 5px); }
    100% { transform: translate(0); }
}

.shake {
    animation: shake 0.5s;
}

/* Main */
#main {
    display: none;
    padding-top: 60px;
}

h1 {
    color: #ff4d88;
}

/* Typewriter */
#typewriter {
    font-size: 20px;
    width: 80%;
    margin: auto;
    color: #444;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Cute */
.float {
    position: absolute;
    font-size: 28px;
    animation: floatSlow linear infinite;
}

@keyframes floatSlow {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

</style>
</head>

<body>

<div id="intro">
    <h2>I made something for you 💌</h2>
    <button onclick="start()">Open 🎁</button>
</div>

<div id="countdown"></div>

<div id="bigWish">
    HAPPY BIRTHDAY MIMI 💕
</div>

<div id="main">
    <h1>For you 💕</h1>
    <div id="typewriter"></div>
</div>

<script>

function start() {
    document.getElementById("intro").style.display = "none";
    startCountdown();
}

// Countdown
let num = 5;
function startCountdown() {
    let cd = document.getElementById("countdown");
    cd.style.display = "flex";
    cd.innerHTML = num;

    let interval = setInterval(() => {
        num--;
        cd.innerHTML = num;

        if (num === 0) {
            clearInterval(interval);
            cd.style.display = "none";
            showWish();
        }
    }, 1000);
}

// Big Wish with shake
function showWish() {
    let wish = document.getElementById("bigWish");
    wish.style.display = "flex";
    wish.classList.add("shake");

    setTimeout(() => {
        wish.classList.remove("shake");
    }, 500);

    setTimeout(() => {
        wish.style.display = "none";
        showMain();
    }, 2000);
}

// Main
function showMain() {
    document.getElementById("main").style.display = "block";
    typeMessage();
    createHearts();
    createCute();
}

// Typewriter
let text = "You are the best thing that happened in my life 🤍\n\nThank you for being with me… always.\n\nI truly pray that all your wishes come true on this beautiful day ✨\n\nI just want to keep celebrating your birthdays with you, again and again 💕";

let i = 0;
function typeMessage() {
    if (i < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeMessage, 50);
    }
}

// Hearts
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.animationDuration = (4 + Math.random()*3) + "s";
        document.body.appendChild(heart);
    }, 300);
}

// Cute
function createCute() {
    let items = ["🦋","🐦","🌸","✨","💫","🐥"];
    setInterval(() => {
        let el = document.createElement("div");
        el.className = "float";
        el.innerHTML = items[Math.floor(Math.random()*items.length)];
        el.style.left = Math.random()*100 + "vw";
        el.style.animationDuration = (6 + Math.random()*4) + "s";
        document.body.appendChild(el);
    }, 700);
}

</script>

</body>
</html>
